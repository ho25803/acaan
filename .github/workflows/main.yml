name: Build Flet APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Flet
        run: pip install flet
        
      - name: Build APK
        run: python -m flet.cli build apk --module-name app --yes
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          # 빌드 결과물 경로가 어디든 상관없이 apk 파일을 찾아서 업로드합니다.
          path: |
            build/**/*.apk
            build/**/outputs/**/*.apk
